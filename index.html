<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxe 33 | Tienda Oficial</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --accent: #c5a059;
            --dark: #0a0a0a;
            --white: #ffffff;
            --gray: #f2f2f2;
            --whatsapp: #25d366;
            --shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('fondo.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--dark);
        }

        /* --- LOGIN --- */
        #login-page {
            position: fixed;
            inset: 0;
            background: linear-gradient(rgba(0,0,0,0.9), rgba(0,0,0,0.9)), url('fondo.jpg');
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .login-card {
            background: rgba(10, 10, 10, 0.9);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid rgba(197, 160, 89, 0.3);
            text-align: center;
            width: 85%;
            max-width: 340px;
            backdrop-filter: blur(10px);
        }

        .brand-logo { width: 80px; height: 80px; border-radius: 50%; border: 2px solid var(--accent); margin-bottom: 15px; }

        .login-card h1 { font-family: 'Cinzel', serif; color: var(--accent); font-size: 1.5rem; letter-spacing: 2px; }
        
        input {
            width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px;
            border: 1px solid #333; background: #000; color: white; box-sizing: border-box;
        }

        .btn-gold {
            width: 100%; padding: 14px; background: var(--accent); border: none;
            color: #000; font-weight: 700; border-radius: 10px; cursor: pointer; margin-top: 10px;
        }

        /* --- HEADER --- */
        header {
            background: rgba(0, 0, 0, 0.9);
            padding: 10px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 900;
            border-bottom: 1px solid var(--accent);
        }

        .logo-text { font-family: 'Cinzel', serif; color: var(--accent); font-size: 1.2rem; }

        /* --- CATÁLOGO PROLIJO --- */
        .catalog {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* 2 columnas en móvil */
            gap: 12px;
            padding: 15px;
            max-width: 1100px;
            margin: 0 auto;
        }

        @media (min-width: 768px) {
            .catalog { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        }

        .perfume-card {
            background: #fff;
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: var(--shadow);
        }

        .img-container { 
            width: 100%; 
            aspect-ratio: 1 / 1.1; 
            background: #fff; 
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            box-sizing: border-box;
        }

        .perfume-card img { 
            max-width: 100%; 
            max-height: 100%; 
            object-fit: contain; /* No corta la imagen, la ajusta */
        }

        .p-content { padding: 10px; text-align: center; flex-grow: 1; display: flex; flex-direction: column; }
        
        .p-content h3 { 
            margin: 0; 
            font-size: 0.85rem; 
            text-transform: uppercase; 
            color: #333;
            letter-spacing: 0.5px;
            height: 38px; /* Mantiene alineación */
            overflow: hidden;
        }

        .p-price { 
            font-size: 1rem; 
            font-weight: 700; 
            color: #000; 
            margin: 5px 0;
        }

        .btn-add-cart {
            background: #000;
            color: #fff;
            border: none;
            padding: 8px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: auto;
        }

        /* --- CARRITO --- */
        .cart-panel-btn {
            position: fixed; bottom: 20px; right: 20px;
            background: var(--dark); color: var(--accent);
            padding: 12px 20px; border-radius: 30px;
            font-size: 0.8rem; border: 1px solid var(--accent);
            z-index: 950; cursor: pointer; display: none;
        }

        #cart-modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8);
            display: none; justify-content: center; align-items: center; z-index: 2000;
        }

        .cart-content { background: white; width: 90%; max-width: 400px; border-radius: 20px; padding: 20px; }
        
        .cart-item { display: flex; justify-content: space-between; border-bottom: 1px solid #eee; padding: 10px 0; font-size: 0.9rem; }

        .btn-send {
            background: var(--whatsapp); color: white; width: 100%; padding: 15px;
            border: none; border-radius: 10px; font-weight: 700; margin-top: 15px; cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="login-page">
        <div class="login-card">
            <h1>LUXE 33</h1>
            <p>Catálogo Digital</p>
            <input type="text" id="login-name" placeholder="Tu nombre">
            <input type="tel" id="login-phone" placeholder="Tu WhatsApp">
            <button class="btn-gold" onclick="startApp()">Entrar</button>
        </div>
    </div>

    <header>
        <div class="logo-text">LUXE 33</div>
        <div id="user-info" style="color: var(--accent); font-size: 0.7rem; font-weight: 600;"></div>
    </header>

    <div class="catalog" id="catalog-container"></div>

    <div class="cart-panel-btn" id="cart-float" onclick="toggleCart()">
        <i class="fa-solid fa-bag-shopping"></i> <span id="cart-count">0</span>
    </div>

    <div id="cart-modal">
        <div class="cart-content">
            <h2 style="margin:0 0 15px 0; font-size: 1.2rem;">Mi Pedido</h2>
            <div id="cart-items-list"></div>
            <div style="margin-top:15px; font-weight:700; text-align:right;">Total: <span id="cart-total">$0</span></div>
            <button class="btn-send" onclick="sendToWhatsApp()">CONFIRMAR POR WHATSAPP</button>
            <button onclick="toggleCart()" style="width:100%; background:none; border:none; color:#999; margin-top:10px; cursor:pointer;">Cerrar</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCk7SBzh9YfsWzu1FimDSQjr5Sr1xo8Ces",
            authDomain: "perfumes-luxe.firebaseapp.com",
            databaseURL: "https://perfumes-luxe-default-rtdb.firebaseio.com",
            projectId: "perfumes-luxe",
            storageBucket: "perfumes-luxe.firebasestorage.app",
            messagingSenderId: "1893279285",
            appId: "1:1893279285:web:e985b980103ccfee02f37c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let cart = [];
        let userData = JSON.parse(localStorage.getItem('luxe_user')) || null;

        window.startApp = function() {
            const name = document.getElementById('login-name').value;
            const phone = document.getElementById('login-phone').value;
            if(name && phone) {
                userData = { name, phone };
                localStorage.setItem('luxe_user', JSON.stringify(userData));
                location.reload();
            }
        }

        if(userData) {
            document.getElementById('login-page').style.display = 'none';
            document.getElementById('user-info').innerText = userData.name.toUpperCase();
            
            onValue(ref(db, 'perfumes'), (snapshot) => {
                const container = document.getElementById('catalog-container');
                container.innerHTML = '';
                snapshot.forEach(child => {
                    const p = child.val();
                    container.innerHTML += `
                        <div class="perfume-card">
                            <div class="img-container"><img src="${p.img}"></div>
                            <div class="p-content">
                                <h3>${p.nombre}</h3>
                                <div class="p-price">${p.precio}</div>
                                <button class="btn-add-cart" onclick="addToCart('${child.key}', '${p.nombre}', '${p.precio}')">
                                    + AGREGAR
                                </button>
                            </div>
                        </div>`;
                });
            });
        }

        window.addToCart = function(id, name, priceStr) {
            const price = parseInt(priceStr.replace(/[^0-9]/g, ""));
            const existing = cart.find(item => item.id === id);
            if(existing) existing.qty++;
            else cart.push({ id, name, price, qty: 1 });
            updateCartUI();
            document.getElementById('cart-float').style.display = 'block';
        }

        function updateCartUI() {
            const list = document.getElementById('cart-items-list');
            const totalDisplay = document.getElementById('cart-total');
            const count = document.getElementById('cart-count');
            let total = 0, items = 0;
            list.innerHTML = '';
            cart.forEach((item) => {
                total += item.price * item.qty;
                items += item.qty;
                list.innerHTML += `<div class="cart-item"><span>${item.qty}x ${item.name}</span><span>$${(item.price*item.qty).toLocaleString()}</span></div>`;
            });
            count.innerText = items;
            totalDisplay.innerText = `$${total.toLocaleString()}`;
        }

        window.toggleCart = () => {
            const m = document.getElementById('cart-modal');
            m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
        }

        window.sendToWhatsApp = () => {
            let t = 0, txt = `🛍️ *PEDIDO: LUXE 33*%0A👤 *Cliente:* ${userData.name}%0A%0A`;
            cart.forEach(i => {
                txt += `• ${i.qty}x ${i.name} ($${(i.price*i.qty).toLocaleString()})%0A`;
                t += i.price*i.qty;
            });
            txt += `%0A💰 *TOTAL: $${t.toLocaleString()}*`;
            window.open(`https://wa.me/59898324329?text=${txt}`, '_blank');
        }
    </script>
</body>
</html>
